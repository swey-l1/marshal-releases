name: Log download count

on:
  schedule:
    - cron: '17 6 * * *'   # daily ~06:17 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append daily download total
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api "repos/${{ github.repository }}/releases" --jq '[.[].assets[].download_count] | add // 0')
          today=$(date -u +%Y-%m-%d)
          file=download-stats.csv
          [ -f "$file" ] || echo "date,total_downloads" > "$file"
          if grep -q "^$today," "$file"; then
            sed -i "s/^$today,.*/$today,$total/" "$file"
          else
            echo "$today,$total" >> "$file"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git diff --cached --quiet || git commit -m "chore: download total $today = $total"
          git push
